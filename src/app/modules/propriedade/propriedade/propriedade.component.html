<mat-card>
  <mat-card-header>
    <mat-card-title>Propriedades da Sala {{ salaId }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="propriedades" class="mat-elevation-z8">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let propriedade"> {{ propriedade.nome }} </td>
      </ng-container>

      <ng-container matColumnDef="valorCompra">
        <th mat-header-cell *matHeaderCellDef> Valor </th>
        <td mat-cell *matCellDef="let propriedade"> R$ {{ propriedade.valorCompra | number:'1.2-2' }} </td>
      </ng-container>

      <ng-container matColumnDef="cor">
        <th mat-header-cell *matHeaderCellDef> Cor </th>
        <td mat-cell *matCellDef="let propriedade">
          <div [style.background-color]="propriedade.cor" style="width: 20px; height: 20px; border-radius: 50%;"></div>
        </td>
      </ng-container>

      <ng-container matColumnDef="hipotecada">
        <th mat-header-cell *matHeaderCellDef> Hipotecada </th>
        <td mat-cell *matCellDef="let propriedade"> {{ propriedade.hipotecada ? 'Sim' : 'Não' }} </td>
      </ng-container>

      <ng-container matColumnDef="dono">
        <th mat-header-cell *matHeaderCellDef> Dono </th>
        <td mat-cell *matCellDef="let propriedade"> {{ propriedade.dono?.nome || 'Banco' }} </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef> Transferir para </th>
        <td mat-cell *matCellDef="let propriedade">
          <mat-form-field appearance="fill">
            <mat-select #novoDono (selectionChange)="transferirPropriedade(propriedade.id, novoDono.value)">
              <mat-option *ngFor="let jogador of jogadores" [value]="jogador.id">
                {{ jogador.nome }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <p *ngIf="mensagem" [class.error]="mensagem.includes('Erro')" [class.success]="!mensagem.includes('Erro')">
      {{ mensagem }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/salas', salaId]">Voltar</button>
  </mat-card-actions>
</mat-card>
