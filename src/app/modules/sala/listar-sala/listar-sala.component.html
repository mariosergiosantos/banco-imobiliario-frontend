<table mat-table [dataSource]="salas" class="mat-elevation-z8">
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let sala"> {{ sala.status }} </td>
  </ng-container>

  <ng-container matColumnDef="jogadores">
    <th mat-header-cell *matHeaderCellDef> Jogadores </th>
    <td mat-cell *matCellDef="let sala"> {{ sala.jogadores.length }} </td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef> Ações </th>
    <td mat-cell *matCellDef="let sala">
      <button mat-button color="primary" [routerLink]="['/salas', sala.id]">Entrar</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['status', 'jogadores', 'acoes']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['status', 'jogadores', 'acoes'];"></tr>
</table>
<p *ngIf="mensagem" class="error">{{ mensagem }}</p>

<mat-card-actions>
  <button mat-button color="primary" [routerLink]="['/']">Voltar</button>
</mat-card-actions>
