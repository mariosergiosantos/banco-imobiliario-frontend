<div class="header-actions">
  <h1 class="page-title">Salas Disponíveis</h1>
  <button mat-raised-button color="primary" [routerLink]="['/salas/criar']">
    <mat-icon>add</mat-icon> Nova Sala
  </button>
</div>

<mat-card class="table-card">
  <table mat-table [dataSource]="salas" class="full-width">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID da Sala </th>
      <td mat-cell *matCellDef="let sala"> <strong>#{{ sala.id }}</strong> </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let sala">
        <mat-chip-set>
          <mat-chip [color]="getStatusColor(sala.status)" [highlighted]="true" class="status-chip">
            {{ sala.status }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="jogadores">
      <th mat-header-cell *matHeaderCellDef> Jogadores </th>
      <td mat-cell *matCellDef="let sala">
        <div class="player-count">
          <mat-icon class="icon-small">people</mat-icon>
          {{ sala.jogadores?.length || 0 }}
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="dataCriacao">
      <th mat-header-cell *matHeaderCellDef> Criada em </th>
      <td mat-cell *matCellDef="let sala"> {{ sala.dataCriacao | date:'dd/MM/yyyy HH:mm' }} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let sala">
        <button mat-flat-button color="primary" [routerLink]="['/salas', sala.id]">
          <mat-icon>login</mat-icon> Entrar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
  </table>

  <div *ngIf="salas.length === 0 && !mensagem" class="empty-state">
    <mat-icon class="large-icon">search_off</mat-icon>
    <p>Nenhuma sala encontrada. Que tal criar uma nova?</p>
  </div>

  <div *ngIf="mensagem" class="error-container">
    <mat-icon color="warn">error</mat-icon>
    <p class="error">{{ mensagem }}</p>
    <button mat-button color="primary" (click)="listarSalas()">Tentar Novamente</button>
  </div>
</mat-card>
