<mat-card class="criar-sala-card">
  <mat-card-header>
    <mat-card-title>Criar Nova Sala</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form (ngSubmit)="criarSala()">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nome do Jogador (Admin)</mat-label>
        <input matInput [(ngModel)]="nomeJogador" name="nomeJogador" required>
      </mat-form-field>

      <div class="actions">
        <button mat-raised-button color="primary" type="submit">Criar</button>
        <button mat-button color="secondary" [routerLink]="['/salas']">Cancelar</button>
      </div>
    </form>
    <p *ngIf="mensagem" class="error">{{ mensagem }}</p>
  </mat-card-content>
</mat-card>
