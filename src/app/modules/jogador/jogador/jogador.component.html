<div class="header-row">
  <h1 class="page-title">Gestão de Jogadores</h1>
  <button mat-button color="primary" [routerLink]="['/salas', salaId]">
    <mat-icon>arrow_back</mat-icon> Dashboard
  </button>
</div>

<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Adicionar Novo Competidor</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form (ngSubmit)="adicionarJogador()" class="add-player-form">
      <mat-form-field appearance="outline">
        <mat-label>Nome Completo</mat-label>
        <mat-icon matPrefix>person_add</mat-icon>
        <input matInput [(ngModel)]="novoJogadorNome" name="novoJogadorNome" required placeholder="Ex: Roberto Carlos">
      </mat-form-field>
      <button mat-raised-button color="accent" type="submit" [disabled]="!novoJogadorNome" style="height: 56px; margin-top: -20px;">
        <mat-icon>add</mat-icon> Adicionar
      </button>
    </form>
    <div *ngIf="mensagem" class="status-msg">
      <p [class.error]="mensagem.includes('Erro')" [class.success]="!mensagem.includes('Erro')">
        {{ mensagem }}
      </p>
    </div>
  </mat-card-content>
</mat-card>

<mat-card class="table-card">
  <mat-card-header>
    <mat-card-title>Mesa Atual</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="jogadores" class="full-width">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let jogador"> <span class="text-muted">#{{ jogador.id }}</span> </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome do Jogador </th>
        <td mat-cell *matCellDef="let jogador"> <strong>{{ jogador.nome }}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="saldo">
        <th mat-header-cell *matHeaderCellDef> Saldo em Conta </th>
        <td mat-cell *matCellDef="let jogador">
          <mat-chip [class.positive]="jogador.saldo >= 0" [class.negative]="jogador.saldo < 0" class="saldo-chip">
            R$ {{ jogador.saldo | number:'1.2-2' }}
          </mat-chip>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
    </table>
  </mat-card-content>
</mat-card>
