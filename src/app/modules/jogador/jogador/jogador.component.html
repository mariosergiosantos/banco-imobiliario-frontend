<mat-card>
  <mat-card-header>
    <mat-card-title>Jogadores da Sala {{ salaId }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form (ngSubmit)="adicionarJogador()" class="add-player-form">
      <mat-form-field appearance="fill">
        <mat-label>Novo Jogador</mat-label>
        <input matInput [(ngModel)]="novoJogadorNome" name="novoJogadorNome" required>
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit">Adicionar</button>
    </form>

    <table mat-table [dataSource]="jogadores" class="mat-elevation-z8">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let jogador"> {{ jogador.id }} </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let jogador"> {{ jogador.nome }} </td>
      </ng-container>

      <ng-container matColumnDef="saldo">
        <th mat-header-cell *matHeaderCellDef> Saldo </th>
        <td mat-cell *matCellDef="let jogador"> R$ {{ jogador.saldo | number:'1.2-2' }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <p *ngIf="mensagem" [class.error]="mensagem.includes('Erro')" [class.success]="!mensagem.includes('Erro')">
      {{ mensagem }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/salas', salaId]">Voltar</button>
  </mat-card-actions>
</mat-card>
